schema_version: checkpointflow/v1
workflow:
  id: agent_decision
  name: Agent Analysis with Human Review
  version: 0.2.0
  description: >
    An agent analyzes a data source, then pauses for human review.
    The human can approve (which applies the changes) or request revisions.
    Demonstrates the basic agent-does-work, human-approves pattern.

  inputs:
    type: object
    required: [data_source]
    properties:
      data_source:
        type: string
        description: Data source identifier for the agent to analyze
        examples: ["sales_q1", "user_signups_march", "churn_report_2026"]

  steps:
    - id: analyze
      kind: await_event
      audience: agent
      event_name: analysis
      name: "Agent: Analyze Data Source"
      prompt: |
        Analyze the data source "${inputs.data_source}".

        Investigate the data, identify patterns, anomalies, and
        key insights. Summarize your findings.
      input_schema:
        type: object
        required: [summary]
        properties:
          summary: { type: string, description: Summary of the analysis }
          findings:
            type: array
            items: { type: string }
            description: Key findings from the analysis
          recommendation: { type: string }

    - id: review
      kind: await_event
      audience: user
      event_name: review_decision
      prompt: |
        Analysis of "${inputs.data_source}" complete.

        Summary: ${steps.analyze.outputs.summary}
        Findings: ${steps.analyze.outputs.findings}
        Recommendation: ${steps.analyze.outputs.recommendation}

        Approve to apply the changes, or request revisions.
      input_schema:
        type: object
        required: [action]
        properties:
          action:
            type: string
            enum: [approve, revise]
          notes:
            type: string
      transitions:
        - when: ${event.action == "approve"}
          next: apply
        - when: ${event.action == "revise"}
          next: revision_needed

    - id: apply
      kind: await_event
      audience: agent
      event_name: changes_applied
      name: "Agent: Apply Approved Changes"
      prompt: |
        The analysis of "${inputs.data_source}" was approved.

        Apply the recommended changes based on the analysis:
        ${steps.analyze.outputs.recommendation}

        Report what was done.
      input_schema:
        type: object
        required: [applied]
        properties:
          applied: { type: boolean }
          details: { type: string }

    - id: complete
      kind: end
      result:
        outcome: applied

    - id: revision_needed
      kind: end
      result:
        outcome: needs_revision
