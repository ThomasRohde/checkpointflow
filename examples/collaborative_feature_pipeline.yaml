schema_version: checkpointflow/v1
workflow:
  id: collaborative_feature_pipeline
  name: Collaborative Feature Planning Pipeline
  version: 2.0.0
  description: >
    End-to-end feature planning with agent-human collaboration. An agent
    researches the feature idea, runs analysis (feasibility, effort,
    dependencies), then synthesizes findings. Humans set direction, make
    architectural decisions, and give final sign-off. Supports fast-track
    routing for critical features and research spikes for uncertain ones.

  defaults:
    shell: bash

  inputs:
    type: object
    required: [feature_idea, project_name]
    properties:
      feature_idea:
        type: string
        description: Rough description of the feature — the agent uses this to scope research and analysis
        examples:
          - "Real-time collaborative editing for documents"
          - "Usage-based billing with Stripe metering"
          - "SSO integration with SAML and OIDC providers"
      project_name:
        type: string
        description: Project this feature belongs to — used for tracking and artifact naming
        examples: ["acme-platform", "internal-tools", "data-pipeline"]
      priority:
        type: string
        enum: [critical, normal, low]
        description: Feature priority — critical triggers fast-track routing that skips deep analysis

  steps:
    # ── Phase 1: Agent Research ──────────────────────────────
    - id: research
      kind: await_event
      audience: agent
      event_name: feature_analysis
      name: "Agent: Analyze Feature Idea"
      prompt: |
        Investigate the feature idea: "${inputs.feature_idea}"
        Project: ${inputs.project_name}

        Produce an initial assessment covering:
        - A concise summary of what this feature entails
        - Complexity estimate (low, medium, high)
        - Key risks (technical, scope, dependency)
        - Opportunities (UX improvement, cost reduction, future enablement)
        - Similar features in competitors or open-source
      input_schema:
        type: object
        required: [summary, complexity, risks, opportunities]
        properties:
          summary: { type: string }
          complexity: { type: string }
          risks: { type: array, items: { type: string } }
          opportunities: { type: array, items: { type: string } }
          similar_features: { type: array, items: { type: string } }

    # ── Phase 2: Human Sets Direction ────────────────────────
    - id: direction_review
      kind: await_event
      name: "Human: Set Direction"
      audience: user
      event_name: direction_decision
      prompt: |
        Agent research complete for "${inputs.feature_idea}"

        Complexity: ${steps.research.outputs.complexity}
        Risks: ${steps.research.outputs.risks}
        Opportunities: ${steps.research.outputs.opportunities}
        Similar work: ${steps.research.outputs.similar_features}

        How would you like to proceed?
        - full_build: Complete feature implementation
        - mvp: Minimum viable version only
        - spike: Time-boxed research spike
        - cancel: Abandon this feature
      input_schema:
        type: object
        required: [direction]
        properties:
          direction:
            type: string
            enum: [full_build, mvp, spike, cancel]
          guidance:
            type: string
            description: Any specific guidance or constraints for the agent
      transitions:
        - when: ${event.direction == "cancel"}
          next: cancelled
        - when: ${event.direction == "spike"}
          next: spike_research

    # ── Phase 3: Priority Routing ────────────────────────────
    - id: priority_route
      kind: switch
      name: "System: Route by Priority"
      cases:
        - when: 'inputs.priority == "critical"'
          next: fast_track_notice
      default: technical_feasibility

    - id: fast_track_notice
      kind: cli
      name: "System: Fast Track Alert"
      command: echo '{"message":"FAST TRACK activated for ${inputs.project_name}. Expedited analysis in progress."}'

    # ── Phase 4: Deep Analysis (sequential agent steps) ──────
    - id: technical_feasibility
      kind: await_event
      audience: agent
      event_name: feasibility_results
      name: "Agent: Technical Feasibility Check"
      prompt: |
        Assess technical feasibility for: "${inputs.feature_idea}"
        Project: ${inputs.project_name}
        Complexity: ${steps.research.outputs.complexity}

        Evaluate:
        - Is this technically feasible with the current stack?
        - What technology stack and tools are needed?
        - What new dependencies would be required?
        - What are the technical concerns or risks?
        - Confidence level (0.0 to 1.0)
      input_schema:
        type: object
        required: [feasible, confidence]
        properties:
          feasible: { type: boolean }
          tech_stack: { type: array, items: { type: string } }
          new_deps: { type: array, items: { type: string } }
          confidence: { type: number }
          concerns: { type: array, items: { type: string } }

    - id: effort_estimation
      kind: await_event
      audience: agent
      event_name: effort_results
      name: "Agent: Effort Estimation"
      prompt: |
        Estimate the effort for: "${inputs.feature_idea}"
        Feasibility confidence: ${steps.technical_feasibility.outputs.confidence}
        Tech stack: ${steps.technical_feasibility.outputs.tech_stack}

        Provide:
        - Total estimated days
        - Breakdown by phase (design, backend, frontend, testing, docs)
        - Recommended team size
        - Whether phases can run in parallel
      input_schema:
        type: object
        required: [total_days, breakdown]
        properties:
          total_days: { type: number }
          breakdown: { type: object }
          team_size: { type: number }
          parallel_possible: { type: boolean }

    - id: dependency_audit
      kind: await_event
      audience: agent
      event_name: dependency_results
      name: "Agent: Dependency Audit"
      prompt: |
        Audit dependencies for: "${inputs.feature_idea}"
        New deps identified: ${steps.technical_feasibility.outputs.new_deps}

        Check:
        - Are there any hard blockers (missing APIs, incompatible versions)?
        - What soft dependencies exist (minimum versions, optional services)?
        - What external APIs would be consumed?
        - Are all licenses compatible?
      input_schema:
        type: object
        required: [blockers, license_ok]
        properties:
          blockers: { type: array, items: { type: string } }
          soft_deps: { type: array, items: { type: string } }
          external_apis: { type: array, items: { type: string } }
          license_ok: { type: boolean }

    # ── Phase 5: Agent Synthesizes Findings ──────────────────
    - id: synthesize
      kind: await_event
      audience: agent
      event_name: synthesis
      name: "Agent: Synthesize All Findings"
      prompt: |
        Synthesize all analysis for "${inputs.feature_idea}":

        Research: ${steps.research.outputs.summary}
        Feasibility: ${steps.technical_feasibility.outputs.feasible} (confidence: ${steps.technical_feasibility.outputs.confidence})
        Effort: ${steps.effort_estimation.outputs.total_days} days, ${steps.effort_estimation.outputs.team_size} engineers
        Blockers: ${steps.dependency_audit.outputs.blockers}

        Provide:
        - Overall recommendation (proceed, proceed_with_caution, defer, reject)
        - List of design document sections to draft
        - Open questions that need human input before proceeding
      input_schema:
        type: object
        required: [recommendation, design_sections, open_questions]
        properties:
          recommendation: { type: string }
          design_sections: { type: array, items: { type: string } }
          open_questions: { type: array, items: { type: string } }

    # ── Phase 6: Human Makes Architectural Decisions ─────────
    - id: architecture_review
      kind: await_event
      name: "Human: Architectural Decisions"
      audience: user
      event_name: arch_decisions
      prompt: |
        Analysis complete for "${inputs.feature_idea}"

        Feasibility confidence: ${steps.technical_feasibility.outputs.confidence}
        Estimated effort: ${steps.effort_estimation.outputs.total_days} days, ${steps.effort_estimation.outputs.team_size} engineers
        Blockers found: ${steps.dependency_audit.outputs.blockers}
        New dependencies needed: ${steps.technical_feasibility.outputs.new_deps}

        Open questions the agent needs your input on:
        ${steps.synthesize.outputs.open_questions}

        Provide your decisions and whether to proceed with planning.
      input_schema:
        type: object
        required: [proceed, answers]
        properties:
          proceed:
            type: boolean
            description: Whether to proceed with implementation planning
          answers:
            type: object
            description: Your answers to the open questions
          scope_notes:
            type: string
            description: Any scope adjustments or additional constraints
      transitions:
        - when: ${event.proceed == false}
          next: revision_needed

    # ── Phase 7: Agent Drafts and Compiles Plan ──────────────
    - id: compile_plan
      kind: await_event
      audience: agent
      event_name: plan_compiled
      name: "Agent: Draft and Compile Feature Plan"
      prompt: |
        Draft the complete feature plan for "${inputs.feature_idea}".
        Project: ${inputs.project_name}

        Design sections to cover: ${steps.synthesize.outputs.design_sections}
        Human decisions: ${steps.architecture_review.outputs.answers}
        Scope notes: ${steps.architecture_review.outputs.scope_notes}

        For each section, write detailed content covering the design,
        trade-offs, and implementation approach. Then compile everything
        into a cohesive plan with clear next actions.
      input_schema:
        type: object
        required: [plan_ready, total_sections, next_actions]
        properties:
          plan_ready: { type: boolean }
          total_sections: { type: number }
          project: { type: string }
          feature: { type: string }
          next_actions: { type: array, items: { type: string } }

    # ── Phase 8: Final Human Sign-off ────────────────────────
    - id: final_signoff
      kind: await_event
      name: "Human: Final Sign-off"
      audience: user
      event_name: final_decision
      prompt: |
        Feature plan for "${inputs.feature_idea}" is ready.

        Plan sections: ${steps.compile_plan.outputs.total_sections}
        Next actions if approved: ${steps.compile_plan.outputs.next_actions}

        Your call:
        - ship_it: Approve and begin implementation
        - revise: Send back for changes
        - shelve: Park for later
      input_schema:
        type: object
        required: [decision]
        properties:
          decision:
            type: string
            enum: [ship_it, revise, shelve]
          feedback:
            type: string
            description: Any final notes or feedback
      transitions:
        - when: ${event.decision == "ship_it"}
          next: approved
        - when: ${event.decision == "revise"}
          next: revision_needed
        - when: ${event.decision == "shelve"}
          next: shelved

    # ── Terminal States ──────────────────────────────────────
    - id: approved
      kind: end
      result:
        status: approved
        project: ${inputs.project_name}
        feature: ${inputs.feature_idea}
        message: Feature plan approved and ready for implementation.

    - id: revision_needed
      kind: end
      result:
        status: needs_revision
        project: ${inputs.project_name}
        message: Sent back for revision. Update inputs and re-run.

    - id: shelved
      kind: end
      result:
        status: shelved
        project: ${inputs.project_name}
        message: Feature shelved for future consideration.

    - id: cancelled
      kind: end
      result:
        status: cancelled
        project: ${inputs.project_name}
        message: Feature cancelled based on initial review.

    # ── Spike Branch (reached via transition from direction_review) ─
    - id: spike_research
      kind: await_event
      audience: agent
      event_name: spike_results
      name: "Agent: Execute Research Spike"
      prompt: |
        Run a time-boxed research spike for: "${inputs.feature_idea}"
        Project: ${inputs.project_name}

        Investigate feasibility, prototype if possible, and report:
        - Key findings from the exploration
        - Recommendation on how to proceed
        - What artifacts were produced (reports, prototypes, benchmarks)
        - How long the spike took
      input_schema:
        type: object
        required: [spike_complete, findings]
        properties:
          spike_complete: { type: boolean }
          findings: { type: string }
          recommendation: { type: string }
          artifacts: { type: array, items: { type: string } }
          time_box: { type: string }

    - id: spike_review
      kind: await_event
      name: "Human: Review Spike Results"
      audience: user
      event_name: spike_review_decision
      prompt: |
        Research spike complete.

        Findings: ${steps.spike_research.outputs.findings}
        Recommendation: ${steps.spike_research.outputs.recommendation}
        Artifacts produced: ${steps.spike_research.outputs.artifacts}
        Time spent: ${steps.spike_research.outputs.time_box}

        Based on the spike results, what next?
        - promote: Move to full feature development (re-run with full_build or mvp)
        - shelve: Park the idea for now
      input_schema:
        type: object
        required: [next_action]
        properties:
          next_action:
            type: string
            enum: [promote, shelve]
          notes:
            type: string
      transitions:
        - when: ${event.next_action == "promote"}
          next: spike_promoted
        - when: ${event.next_action == "shelve"}
          next: shelved

    - id: spike_promoted
      kind: end
      result:
        status: spike_promoted
        project: ${inputs.project_name}
        message: Spike validated the approach. Re-run with direction full_build or mvp to proceed.
