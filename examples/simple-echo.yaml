schema_version: checkpointflow/v1
workflow:
  id: simple_echo
  name: Simple Echo
  version: 0.1.0
  description: >
    Minimal example workflow — takes a name as input, echoes a greeting,
    and completes. Use this as a starting template or to verify cpf is working.

  inputs:
    type: object
    required: [name]
    properties:
      name:
        type: string
        description: Name to include in the greeting
        examples: ["Alice", "World", "checkpointflow"]

  steps:
    - id: greet
      kind: cli
      command: echo "Hello, ${inputs.name}!"

    - id: done
      kind: end
      result:
        status: completed
