schema_version: checkpointflow/v1
workflow:
  id: conditional_steps
  name: Conditional Steps Demo
  version: 0.1.0
  description: >
    Demonstrates step-level if conditions. Runs setup in both modes,
    but only runs the full scan when mode is "full". The full_scan step
    is skipped entirely in quick mode.

  inputs:
    type: object
    required: [mode]
    properties:
      mode:
        type: string
        description: Controls which steps execute — "full" runs all steps, "quick" skips the full scan
        examples: ["quick", "full"]

  steps:
    - id: setup
      kind: cli
      command: echo "Setting up in ${inputs.mode} mode"

    - id: full_scan
      kind: cli
      command: echo "Running full scan"
      if: inputs.mode == "full"

    - id: done
      kind: end
      result:
        mode: ${inputs.mode}
