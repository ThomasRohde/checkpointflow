schema_version: checkpointflow/v1
workflow:
  id: cpf_feature_development
  name: CPF Feature Development
  version: 2.0.0
  description: >
    Development workflow for adding features to checkpointflow itself.
    Follows the project's TDD methodology: write failing tests first,
    implement to make them pass, then run the full quality gate.
    Agent steps pause for real work; human steps pause for decisions.

  defaults:
    shell: bash

  inputs:
    type: object
    required: [feature_name, description]
    properties:
      feature_name:
        type: string
        description: Short name for the feature
        examples: ["run-delete", "gui-filter", "batch-resume"]
      description:
        type: string
        description: What the feature should do and why
        examples:
          - "Allow users to delete finished runs from the GUI"
          - "Add filtering by status in the run list"
      area:
        type: string
        enum: [cli, engine, gui, persistence, schema, models]
        description: Primary area of the codebase this feature affects

  steps:
    # ── Phase 1: Codebase Analysis ──────────────────────────
    - id: analyze_codebase
      kind: await_event
      audience: agent
      event_name: codebase_analysis
      name: "Agent: Analyze Affected Area"
      prompt: |
        Analyze the codebase for feature "${inputs.feature_name}" in area "${inputs.area}".

        Scan src/checkpointflow/${inputs.area}/ and identify:
        - Source files and their responsibilities
        - Existing test files matching tests/test_${inputs.area}*.py
        - Key imports and dependencies (models, engine, persistence)
        - Whether this feature impacts the JSON schema in schemas/

        Provide your findings as structured output.
      input_schema:
        type: object
        required: [area, source_dir, notes]
        properties:
          area: { type: string, description: Primary area analyzed }
          source_dir: { type: string, description: Path to source directory }
          existing_tests: { type: string, description: Glob pattern for existing test files }
          imports_to_check:
            type: array
            items: { type: string }
            description: Key modules this area depends on
          schema_impact: { type: boolean, description: Whether the JSON schema needs changes }
          notes: { type: string, description: Summary of findings }

    # ── Phase 2: Human Scoping Decision ─────────────────────
    - id: scope_decision
      kind: await_event
      name: "Human: Set Scope"
      audience: user
      event_name: scope_choice
      prompt: |
        Feature: ${inputs.feature_name}
        Description: ${inputs.description}
        Affected area: ${steps.analyze_codebase.outputs.area}
        Source directory: ${steps.analyze_codebase.outputs.source_dir}
        Existing tests: ${steps.analyze_codebase.outputs.existing_tests}
        Schema impact: ${steps.analyze_codebase.outputs.schema_impact}

        How should we scope this?
        - full: Complete implementation with tests, docs, and CLI surface
        - minimal: Core logic and tests only, no docs update
        - spike: Explore feasibility, no production code
        - cancel: Drop this feature
      input_schema:
        type: object
        required: [scope]
        properties:
          scope:
            type: string
            enum: [full, minimal, spike, cancel]
          constraints:
            type: string
            description: Any constraints or guidance for the implementation
      transitions:
        - when: ${event.scope == "cancel"}
          next: cancelled
        - when: ${event.scope == "spike"}
          next: spike

    # ── Phase 3: Route by scope ─────────────────────────────
    - id: scope_route
      kind: switch
      name: "System: Route by Scope"
      cases:
        - when: 'steps.scope_decision.outputs.scope == "full"'
          next: tdd_plan
      default: tdd_plan

    # ── Phase 4: TDD Plan ───────────────────────────────────
    - id: tdd_plan
      kind: await_event
      audience: agent
      event_name: tdd_plan_draft
      name: "Agent: Draft TDD Plan"
      prompt: |
        Plan the TDD approach for feature "${inputs.feature_name}" in area "${inputs.area}".

        Context from codebase analysis:
        - Source dir: ${steps.analyze_codebase.outputs.source_dir}
        - Existing tests: ${steps.analyze_codebase.outputs.existing_tests}
        - Dependencies: ${steps.analyze_codebase.outputs.imports_to_check}
        - Schema impact: ${steps.analyze_codebase.outputs.schema_impact}

        Design the test cases that should be written BEFORE implementation.
        Include the test file path, individual test case names, any fixtures
        needed, and the implementation steps to make them pass.
      input_schema:
        type: object
        required: [feature, test_file, test_cases, implementation_steps]
        properties:
          feature: { type: string }
          test_file: { type: string, description: Path to the test file }
          test_cases:
            type: array
            items: { type: string }
            description: List of test function names
          fixtures_needed:
            type: array
            items: { type: string }
            description: Pytest fixtures required
          implementation_steps:
            type: array
            items: { type: string }
            description: Ordered steps to implement the feature

    # ── Phase 5: Human Reviews Test Plan ────────────────────
    - id: review_tdd_plan
      kind: await_event
      name: "Human: Review TDD Plan"
      audience: user
      event_name: tdd_review
      prompt: |
        TDD plan for "${inputs.feature_name}":

        Test file: ${steps.tdd_plan.outputs.test_file}
        Test cases: ${steps.tdd_plan.outputs.test_cases}
        Fixtures needed: ${steps.tdd_plan.outputs.fixtures_needed}

        Implementation steps: ${steps.tdd_plan.outputs.implementation_steps}

        Approve the plan, request changes, or cancel?
      input_schema:
        type: object
        required: [decision]
        properties:
          decision:
            type: string
            enum: [approve, revise, cancel]
          feedback:
            type: string
            description: Feedback or changes to the plan
      transitions:
        - when: ${event.decision == "cancel"}
          next: cancelled
        - when: ${event.decision == "revise"}
          next: needs_revision

    # ── Phase 6: Write Failing Tests ────────────────────────
    - id: write_tests
      kind: await_event
      audience: agent
      event_name: tests_written
      name: "Agent: Write Failing Tests"
      prompt: |
        Write the test file for feature "${inputs.feature_name}".

        Test file: ${steps.tdd_plan.outputs.test_file}
        Test cases to write: ${steps.tdd_plan.outputs.test_cases}
        Fixtures needed: ${steps.tdd_plan.outputs.fixtures_needed}

        Write all planned test cases. They should fail because no
        implementation exists yet. Follow existing test patterns in the
        codebase. Actually create the test file on disk.
      input_schema:
        type: object
        required: [tests_written, test_count, status]
        properties:
          tests_written: { type: boolean }
          test_file: { type: string }
          test_count: { type: number }
          status: { type: string, description: "all_failing or error" }
          message: { type: string }

    # ── Phase 7: Implement Feature ──────────────────────────
    - id: implement_feature
      kind: await_event
      audience: agent
      event_name: feature_implemented
      name: "Agent: Implement Feature"
      prompt: |
        Implement feature "${inputs.feature_name}" to make the tests pass.

        Test file: ${steps.write_tests.outputs.test_file}
        Test count: ${steps.write_tests.outputs.test_count}

        Implementation steps from the plan:
        ${steps.tdd_plan.outputs.implementation_steps}

        Write the production code. Run the tests to verify they pass.
        Report which files were changed.
      input_schema:
        type: object
        required: [implemented, files_changed]
        properties:
          implemented: { type: boolean }
          files_changed:
            type: array
            items: { type: string }
          lines_added: { type: number }
          lines_removed: { type: number }
          message: { type: string }

    # ── Phase 8: Quality Gate ───────────────────────────────
    - id: quality_gate
      kind: await_event
      audience: agent
      event_name: quality_results
      name: "Agent: Run Quality Gate"
      prompt: |
        Run all quality checks on the codebase. Fix any issues before
        reporting results.

        1. Lint + format: uv run ruff check . && uv run ruff format --check .
        2. Type check: uv run mypy
        3. Tests: uv run pytest

        If any check fails, attempt to fix the issue and re-run.
        Report the final pass/fail status for each check.
      input_schema:
        type: object
        required: [lint_ok, mypy_ok, pytest_ok]
        properties:
          lint_ok: { type: boolean }
          format_ok: { type: boolean }
          lint_issues: { type: number }
          mypy_ok: { type: boolean }
          mypy_errors: { type: number }
          pytest_ok: { type: boolean }
          passed: { type: number }
          failed: { type: number }
          skipped: { type: number }
          duration: { type: string }
          notes: { type: string }

    # ── Phase 9: Gate Check ─────────────────────────────────
    - id: gate_result
      kind: switch
      name: "System: Check Gate Results"
      cases:
        - when: 'steps.quality_gate.outputs.lint_ok == true and steps.quality_gate.outputs.mypy_ok == true and steps.quality_gate.outputs.pytest_ok == true'
          next: final_review
      default: gate_failed

    - id: gate_failed
      kind: end
      result:
        status: gate_failed
        feature: ${inputs.feature_name}
        message: Quality gate failed. Fix issues and re-run.

    # ── Phase 10: Final Human Review ────────────────────────
    - id: final_review
      kind: await_event
      name: "Human: Review Implementation"
      audience: user
      event_name: implementation_review
      prompt: |
        Feature "${inputs.feature_name}" is implemented and passing all checks.

        Tests: ${steps.quality_gate.outputs.passed} passed, ${steps.quality_gate.outputs.failed} failed (${steps.quality_gate.outputs.duration})
        Lint OK: ${steps.quality_gate.outputs.lint_ok}
        Types OK: ${steps.quality_gate.outputs.mypy_ok}

        Files changed: ${steps.implement_feature.outputs.files_changed}

        Ready to ship, or needs changes?
      input_schema:
        type: object
        required: [decision]
        properties:
          decision:
            type: string
            enum: [ship_it, revise]
          notes:
            type: string
            description: Any final notes or change requests
      transitions:
        - when: ${event.decision == "ship_it"}
          next: done
        - when: ${event.decision == "revise"}
          next: needs_revision

    # ── Terminal States ─────────────────────────────────────
    - id: done
      kind: end
      result:
        status: complete
        feature: ${inputs.feature_name}
        message: Feature implemented, tested, and approved. Ready to commit.

    - id: needs_revision
      kind: end
      result:
        status: needs_revision
        feature: ${inputs.feature_name}
        message: Sent back for revision. Update and re-run.

    - id: cancelled
      kind: end
      result:
        status: cancelled
        feature: ${inputs.feature_name}
        message: Feature development cancelled.

    # ── Spike Branch ────────────────────────────────────────
    - id: spike
      kind: await_event
      audience: agent
      event_name: spike_results
      name: "Agent: Run Feasibility Spike"
      prompt: |
        Run a feasibility spike for feature "${inputs.feature_name}" in area "${inputs.area}".

        Explore whether this feature is viable:
        - Check if the existing architecture supports it
        - Identify any blocking technical constraints
        - Estimate the effort required
        - Recommend whether to proceed and with what scope
      input_schema:
        type: object
        required: [complete, findings]
        properties:
          complete: { type: boolean }
          feature: { type: string }
          findings: { type: string }
          recommendation: { type: string }
          estimated_effort: { type: string }

    - id: spike_review
      kind: await_event
      name: "Human: Review Spike"
      audience: user
      event_name: spike_decision
      prompt: |
        Spike complete for "${inputs.feature_name}".

        Findings: ${steps.spike.outputs.findings}
        Recommendation: ${steps.spike.outputs.recommendation}
        Estimated effort: ${steps.spike.outputs.estimated_effort}

        Promote to full development or shelve?
      input_schema:
        type: object
        required: [action]
        properties:
          action:
            type: string
            enum: [promote, shelve]
      transitions:
        - when: ${event.action == "promote"}
          next: spike_promoted
        - when: ${event.action == "shelve"}
          next: shelved

    - id: spike_promoted
      kind: end
      result:
        status: spike_promoted
        feature: ${inputs.feature_name}
        message: Spike validated. Re-run with scope full or minimal to implement.

    - id: shelved
      kind: end
      result:
        status: shelved
        feature: ${inputs.feature_name}
        message: Feature shelved for later.
