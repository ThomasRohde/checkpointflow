name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.2"
          enable-cache: true

      - name: Build distributions
        run: uv build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

      - name: Upload dist for publish job
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/*

      - name: Prune uv cache
        if: always()
        run: uv cache prune --ci

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
