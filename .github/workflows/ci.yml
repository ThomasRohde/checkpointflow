name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.2"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --group dev

      - name: Check lockfile
        run: uv lock --check

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy

      - name: Prune uv cache
        if: always()
        run: uv cache prune --ci

  test:
    name: Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.2"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --group dev

      - name: Run tests
        run: uv run pytest

      - name: Prune uv cache
        if: always()
        run: uv cache prune --ci

  package:
    name: Package
    runs-on: ubuntu-latest
    needs:
      - quality
      - test
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.2"
          enable-cache: true

      - name: Build distributions
        run: uv build

      - name: Smoke test wheel entry point
        run: uv tool run --isolated --from ./dist/*.whl cpf --help

      - name: Smoke test wheel import
        run: uv run --isolated --no-project --with ./dist/*.whl python -c "import checkpointflow; print(checkpointflow.__version__)"

      - name: Upload distributions
        uses: actions/upload-artifact@v6
        with:
          name: checkpointflow-dist
          path: dist/*
          if-no-files-found: error
          retention-days: 14

      - name: Prune uv cache
        if: always()
        run: uv cache prune --ci
